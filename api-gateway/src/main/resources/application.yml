server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1

            - id: transaction-service
              uri: http://localhost:8082
              predicates:
                - Path=/transaction/**
              filters:
                - StripPrefix=1

            - id: atm-service
              uri: http://localhost:8083
              predicates:
                - Path=/atm/**
              filters:
                - StripPrefix=1

            - id: credit-service
              uri: http://localhost:8084
              predicates:
                - Path=/credit/**
              filters:
                - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always